name: CI Pipeline

on:
      push:
            branches: [main, develop]
      pull_request:
            branches: [main, develop]

jobs:
      lint-and-build:
            name: Lint & Build
            runs-on: ubuntu-latest

            steps:
                  - name: Checkout code
                    uses: actions/checkout@v4

                  - name: Setup Node.js
                    uses: actions/setup-node@v4
                    with:
                          node-version: "18"
                          cache: "npm"

                  - name: Install dependencies
                    run: npm ci

                  - name: Run linter
                    run: npm run lint

                  - name: Check icon accessibility
                    run: npm run check:icon-aria

                  - name: Build project
                    run: npm run build
                    env:
                          VITE_OPENAI_API_KEY: ${{ secrets.VITE_OPENAI_API_KEY }}
                          VITE_OPENAI_CHATKIT_ENABLED: false

                  - name: Upload build artifacts
                    uses: actions/upload-artifact@v4
                    with:
                          name: dist
                          path: dist/
                          retention-days: 7

      e2e-tests:
            name: E2E Tests (Cypress)
            runs-on: ubuntu-latest
            needs: lint-and-build

            steps:
                  - name: Checkout code
                    uses: actions/checkout@v4

                  - name: Setup Node.js
                    uses: actions/setup-node@v4
                    with:
                          node-version: "18"
                          cache: "npm"

                  - name: Install dependencies
                    run: npm ci

                  - name: Run Cypress tests
                    run: npm run test:e2e
                    env:
                          CYPRESS_VITE_OPENAI_API_KEY: ${{ secrets.VITE_OPENAI_API_KEY }}
                          CYPRESS_VITE_OPENAI_CHATKIT_ENABLED: false

                  - name: Upload Cypress screenshots
                    if: failure()
                    uses: actions/upload-artifact@v4
                    with:
                          name: cypress-screenshots
                          path: cypress/screenshots/

                  - name: Upload Cypress videos
                    if: always()
                    uses: actions/upload-artifact@v4
                    with:
                          name: cypress-videos
                          path: cypress/videos/
